server:
  port: 8081
spring:
  application:
    name: BlockChain_Backed

  datasource:
    url: jdbc:postgresql://localhost:5432/mini_banking_blockchain
    username: postgres
    password: 12345 # Đổi thành mật khẩu PostgreSQL thực tế của bạn
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # Lệnh này cực kỳ quan trọng: Tự động tạo/cập nhật bảng từ code Java
    show-sql: true # Hiển thị câu lệnh SQL trên console để bạn dễ theo dõi
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true